name: Deploy Staging

# Staging = live VPS serving karzartools.com (single host until prod is split).
# Pattern: checkout on GitHub-hosted (VPS often gets 504 from github.com), then
# artifact → self-hosted runner for local rsync/rebuild. Never runs on fork PRs.
on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "alembic/**"
      - "deploy/**"
      - "frontend/**"
      - "scripts/**"
      - "docker-compose*.yml"
      - "Dockerfile*"
      - "requirements*.txt"
      - "gunicorn_conf.py"
      - "docker-entrypoint.sh"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  package:
    name: Package sources
    runs-on: ubuntu-latest
    # Same-repo only (never trust fork workflows on self-hosted)
    if: github.event_name == 'workflow_dispatch' || github.repository == 'Shebahati/Karzar'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-src-${{ github.sha }}
          path: |
            .
            !.git
            !.github
            !**/.venv
            !**/venv
            !**/node_modules
            !**/.next
            !**/__pycache__
            !**/.pytest_cache
            !**/.mypy_cache
            !**/.ruff_cache
          retention-days: 1
          include-hidden-files: true

  deploy:
    name: Sync + rebuild staging
    needs: package
    runs-on: [self-hosted, karzar-vps]
    environment: staging
    if: github.event_name == 'workflow_dispatch' || github.repository == 'Shebahati/Karzar'
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-src-${{ github.sha }}
          path: ${{ runner.temp }}/staging-src

      - name: Sync backend → /opt/karzar/Karzar
        run: |
          set -euo pipefail
          SRC="${{ runner.temp }}/staging-src"
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'frontend/' \
            --exclude '.venv/' \
            --exclude 'venv/' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            --exclude '.env' \
            --exclude '.deploy-secrets' \
            --exclude '.env.staging.generated' \
            --exclude 'backups/' \
            --exclude 'data/uploads/' \
            --exclude 'logs/' \
            --exclude '*.pyc' \
            --exclude '.mypy_cache/' \
            --exclude '.ruff_cache/' \
            --exclude '.coverage' \
            --exclude 'actions-runner/' \
            "$SRC"/ /opt/karzar/Karzar/

      - name: Sync frontend → /opt/karzar/frontend
        run: |
          set -euo pipefail
          SRC="${{ runner.temp }}/staging-src"
          rsync -a --delete \
            --exclude 'node_modules/' \
            --exclude '.next/' \
            --exclude 'out/' \
            --exclude '.git/' \
            --exclude '.env' \
            --exclude '.env*.local' \
            "$SRC"/frontend/ /opt/karzar/frontend/

      - name: Rebuild backend + frontend
        run: |
          set -euo pipefail
          cd /opt/karzar/Karzar
          chmod +x deploy/staging/scripts/*.sh || true
          bash deploy/staging/scripts/deploy-backend.sh

          export FRONTEND_ROOT=/opt/karzar/frontend
          export NEXT_PUBLIC_API_BASE_URL="${NEXT_PUBLIC_API_BASE_URL:-https://api.karzartools.com/api/v1}"
          if [[ -z "${ADMIN_SESSION_SECRET:-}" ]]; then
            for f in /opt/karzar/.deploy-secrets /opt/karzar/Karzar/.env; do
              if [[ -f "$f" ]] && grep -q '^ADMIN_SESSION_SECRET=' "$f"; then
                ADMIN_SESSION_SECRET="$(grep '^ADMIN_SESSION_SECRET=' "$f" | tail -1 | cut -d= -f2-)"
                break
              fi
            done
          fi
          if [[ -z "${ADMIN_SESSION_SECRET:-}" || "${#ADMIN_SESSION_SECRET}" -lt 32 ]]; then
            echo "ADMIN_SESSION_SECRET missing on server (.deploy-secrets / .env)" >&2
            exit 1
          fi
          export ADMIN_SESSION_SECRET
          bash deploy/staging/scripts/deploy-frontend.sh

          curl -sf http://127.0.0.1:8000/ready
          echo
          curl -sf -o /dev/null -w 'shop:%{http_code}\n' http://127.0.0.1:3000/
          curl -sf -o /dev/null -w 'admin:%{http_code}\n' http://127.0.0.1:3001/ || true
