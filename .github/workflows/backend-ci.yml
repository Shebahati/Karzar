name: Backend CI

# Always run on PRs so required checks `lint` / `test` report a status even for
# frontend-only changes (branch protection requires those exact job names).
# Heavy Python work runs only when backend paths change.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'app/**'
              - 'alembic/**'
              - 'tests/**'
              - 'scripts/**'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - 'ruff.toml'
              - 'mypy.ini'
              - 'alembic.ini'
              - 'gunicorn_conf.py'
              - 'docker-entrypoint.sh'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - '.github/workflows/backend-ci.yml'

  lint:
    name: lint
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Skip Python lint (no backend changes)
        if: needs.changes.outputs.backend != 'true'
        run: |
          echo "No backend paths changed — required check \`lint\` satisfied."

      - name: Setup Python
        if: needs.changes.outputs.backend == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        if: needs.changes.outputs.backend == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff
        if: needs.changes.outputs.backend == 'true'
        run: ruff check app tests

      - name: Mypy
        if: needs.changes.outputs.backend == 'true'
        run: mypy app

  test:
    name: test
    needs: changes
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: karzar_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Skip Python tests (no backend changes)
        if: needs.changes.outputs.backend != 'true'
        run: |
          echo "No backend paths changed — required check \`test\` satisfied."

      - name: Setup Python
        if: needs.changes.outputs.backend == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: needs.changes.outputs.backend == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run database migrations
        if: needs.changes.outputs.backend == 'true'
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_SERVER: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_DB: karzar_ci
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          SECRET_KEY: ci-secret-key-with-at-least-32-characters
          ADMIN_STEP_UP_PIN: 93827461
          DEBUG: "true"
          ENABLE_API_DOCS: "false"
          USE_POSTGRES_TESTS: "1"
          ALLOW_PUBLIC_REGISTER: "true"
          OTP_DEV_ECHO: "true"
        run: alembic upgrade head

      - name: Run tests with coverage gate
        if: needs.changes.outputs.backend == 'true'
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_SERVER: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_DB: karzar_ci
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          SECRET_KEY: ci-secret-key-with-at-least-32-characters
          ADMIN_STEP_UP_PIN: 93827461
          DEBUG: "true"
          ENABLE_API_DOCS: "false"
          USE_POSTGRES_TESTS: "1"
          ALLOW_PUBLIC_REGISTER: "true"
          OTP_DEV_ECHO: "true"
        run: |
          pytest --maxfail=1 --disable-warnings \
            --cov=app --cov-report=term-missing --cov-fail-under=62
