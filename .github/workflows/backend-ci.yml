name: Backend CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: karzar_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_SERVER: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_DB: karzar_ci
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          SECRET_KEY: ci-secret-key-with-at-least-32-characters
          ADMIN_STEP_UP_PIN: 93827461
          DEBUG: "true"
          ENABLE_API_DOCS: "false"
          ALLOW_PUBLIC_REGISTER: "true"
          OTP_DEV_ECHO: "true"
        run: |
          pytest --maxfail=1 --disable-warnings --cov=app --cov-report=term-missing
