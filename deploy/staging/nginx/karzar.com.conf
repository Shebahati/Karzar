# Karzar staging — karzartools.com (primary)
# Storefront: karzartools.com + www.karzartools.com
# API:        api.karzartools.com
# Admin:      admin.karzartools.com
#
# Install (HTTP-only bootstrap; Certbot then adds 443):
#   sudo cp deploy/staging/nginx/karzar.com.conf /etc/nginx/sites-available/karzar
#   sudo ln -sf /etc/nginx/sites-available/karzar /etc/nginx/sites-enabled/karzar
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx \
#     -d karzartools.com -d www.karzartools.com \
#     -d api.karzartools.com -d admin.karzartools.com
#
# After Certbot: ensure each HTTPS server has:
#   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
#   proxy_set_header X-Forwarded-Proto $scheme;
# and that API proxy does NOT strip X-Forwarded-Proto.

upstream karzar_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

upstream karzar_shop {
    server 127.0.0.1:3000;
}

upstream karzar_admin {
    server 127.0.0.1:3001;
}

# Shared proxy headers (paste into location / blocks)
# proxy_set_header Host $host;
# proxy_set_header X-Real-IP $remote_addr;
# proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
# proxy_set_header X-Forwarded-Proto $scheme;

# --- Apex → www (canonical shop) ---
server {
    listen 80;
    listen [::]:80;
    server_name karzartools.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.karzartools.com$request_uri;
    }
}

# --- Storefront (www) ---
server {
    listen 80;
    listen [::]:80;
    server_name www.karzartools.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- API ---
server {
    listen 80;
    listen [::]:80;
    server_name api.karzartools.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Admin ---
server {
    listen 80;
    listen [::]:80;
    server_name admin.karzartools.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

